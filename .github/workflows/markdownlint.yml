name: markdown-lint

on:
  pull_request:
    paths:
      - "*.md"
      - "backend/**/*.md"
      - "data/**/*.md"
      - "deploy/**/*.md"
      - "docs/**/*.md"
      - "frontend/**/*.md"
      - "tests/**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "backend/**/*.md"
      - "data/**/*.md"
      - "deploy/**/*.md"
      - "docs/**/*.md"
      - "frontend/**/*.md"
      - "tests/**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "package.json"
      - "package-lock.json"

jobs:
  markdownlint:
    name: markdown-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Markdown lint
        run: npm run lint:md
