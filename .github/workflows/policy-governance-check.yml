name: policy-governance-check

on:
  pull_request:
  push:

jobs:
  policy-governance:
    name: policy-governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix ./frontend

      - name: Validate policy governance state
        run: npm run validate:policy-governance

      - name: Validate policy lifecycle contract generation
        run: npm run validate:policy-lifecycle-contract

      - name: Validate split policy surfaces
        run: npm run validate:policy-surface-split
