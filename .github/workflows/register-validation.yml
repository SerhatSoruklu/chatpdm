name: register-validation

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  register-validation:
    name: register-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Debug runtime
        run: |
          pwd
          node -v
          npm -v
          env | sort
          ls -la

      - name: Verify overlap CI enforcement
        run: npm run verify:overlap-ci-enforcement

      - name: Validate authored registers
        run: npm run validate:registers

      - name: Upload register validation artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: register-validation-report
          path: artifacts/register-validation-report.json
          if-no-files-found: warn
