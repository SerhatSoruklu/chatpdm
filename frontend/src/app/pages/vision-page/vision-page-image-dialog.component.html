<div class="pdm-vision-image-dialog">
  <div class="pdm-vision-image-dialog__header">
    <div class="pdm-vision-image-dialog__title-group">
      <p class="pdm-vision-image-dialog__eyebrow">{{ dialogTitle }}</p>
      <h2 class="pdm-vision-image-dialog__title">{{ data.title }}</h2>
    </div>

    <button type="button" class="pdm-vision-image-dialog__close" (click)="close()">
      {{ closeLabel }}
    </button>
  </div>

  <div class="pdm-vision-image-dialog__body">
    <img
      class="pdm-vision-image-dialog__image"
      [src]="data.imagePath"
      [alt]="data.imageAlt"
      width="676"
      height="1024"
      loading="eager"
      decoding="async"
    />
  </div>

  <p class="pdm-vision-image-dialog__caption">{{ data.caption }}</p>
</div>
