<section class="pdm-policy-filter">
  <div class="pdm-policy-filter__grid">
    <label class="pdm-policy-filter__field pdm-policy-filter__field--search">
      <span class="pdm-policy-filter__label pdm-mono">Search claims</span>
      <input
        type="search"
        class="pdm-policy-filter__input pdm-form-control"
        [value]="search()"
        placeholder="Search sentence, canonical claim, file path"
        (input)="onSearchInput($event)"
      >
    </label>

    <label class="pdm-policy-filter__field">
      <span class="pdm-policy-filter__label pdm-mono">Claim class</span>
      <span class="pdm-select-wrap">
        <select
          class="pdm-policy-filter__select pdm-form-control pdm-select-wrap__control"
          [value]="activeClaimClass()"
          (change)="onClaimClassInput($event)"
        >
          <option value="">All classes</option>
          @for (claimClass of claimClasses(); track claimClass) {
            <option [value]="claimClass">{{ claimClass.replaceAll('_', ' ') }}</option>
          }
        </select>
        <span class="pdm-select-wrap__icon" aria-hidden="true"></span>
      </span>
    </label>

    <label class="pdm-policy-filter__field">
      <span class="pdm-policy-filter__label pdm-mono">Section</span>
      <span class="pdm-select-wrap">
        <select
          class="pdm-policy-filter__select pdm-form-control pdm-select-wrap__control"
          [value]="activeSection()"
          (change)="onSectionInput($event)"
        >
          <option value="">All sections</option>
          @for (section of sections(); track section) {
            <option [value]="section">{{ section }}</option>
          }
        </select>
        <span class="pdm-select-wrap__icon" aria-hidden="true"></span>
      </span>
    </label>
  </div>

  <div class="pdm-policy-filter__meta">
    <label class="pdm-policy-filter__toggle pdm-checkbox">
      <input
        type="checkbox"
        class="pdm-checkbox__input"
        [checked]="internalTransportOnly()"
        (change)="onInternalToggle($event)"
      >
      <span class="pdm-checkbox__box" aria-hidden="true"></span>
      <span class="pdm-checkbox__label">Internal SSR transport only</span>
    </label>

    <p class="pdm-policy-filter__count pdm-mono">
      {{ visibleClaimCount() }} / {{ totalClaimCount() }} claims visible
    </p>

    @if (hasActiveFilters()) {
      <button type="button" class="pdm-policy-filter__clear" (click)="clearFilters.emit()">
        Clear filters
      </button>
    }
  </div>
</section>
