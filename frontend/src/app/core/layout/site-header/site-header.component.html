<header class="pdm-site-header">
  <div class="pdm-site-header__inner">
    <a class="pdm-site-header__brand" routerLink="/" aria-label="ChatPDM home">
      <app-chatpdm-logo class="pdm-site-header__logo" />
      <span class="pdm-site-header__brand-state">Beta</span>
    </a>

    <nav class="pdm-site-header__nav" aria-label="Primary">
      @for (item of navItems; track item.route) {
        <a
          class="pdm-site-header__link"
          [routerLink]="item.route"
          routerLinkActive="pdm-site-header__link--active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <button
      class="pdm-site-header__menu-trigger"
      type="button"
      aria-label="Open navigation"
      [attr.aria-expanded]="isMobileNavOpen()"
      aria-controls="pdm-mobile-nav-sheet"
      (click)="openMobileNav()"
    >
      <span class="pdm-site-header__menu-trigger-line" aria-hidden="true"></span>
      <span class="pdm-site-header__menu-trigger-line" aria-hidden="true"></span>
    </button>
  </div>

  @if (isMobileNavOpen()) {
    <div class="pdm-site-header__sheet-shell" aria-label="Mobile navigation">
      <button class="pdm-site-header__sheet-backdrop" type="button" aria-label="Close navigation" (click)="closeMobileNav()"></button>

      <section class="pdm-site-header__sheet" id="pdm-mobile-nav-sheet" aria-modal="true" role="dialog">
        <div class="pdm-site-header__sheet-top">
          <a class="pdm-site-header__sheet-brand" routerLink="/" aria-label="ChatPDM home" (click)="closeMobileNav()">
            <app-chatpdm-logo class="pdm-site-header__sheet-logo" />
          </a>

          <button class="pdm-site-header__sheet-close" type="button" aria-label="Close navigation" (click)="closeMobileNav()">
            <span aria-hidden="true">Close</span>
          </button>
        </div>

        <nav class="pdm-site-header__sheet-nav" aria-label="Mobile primary">
          @for (item of navItems; track item.route) {
            <a
              class="pdm-site-header__sheet-link"
              [routerLink]="item.route"
              routerLinkActive="pdm-site-header__sheet-link--active"
              [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
              (click)="closeMobileNav()"
            >
              {{ item.label }}
            </a>
          }
        </nav>

        <section class="pdm-site-header__sheet-support" aria-label="Support">
          <p class="pdm-site-header__sheet-support-label pdm-mono">Support</p>
          <a class="pdm-site-header__sheet-support-email" [href]="'mailto:' + supportEmail">{{ supportEmail }}</a>
          <p class="pdm-site-header__sheet-support-copy">Direct support for product and route questions</p>
        </section>
      </section>
    </div>
  }
</header>
